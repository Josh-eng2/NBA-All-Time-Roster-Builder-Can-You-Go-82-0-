<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <!-- 82-0 roundel crest — header badge (js/ui/render.js renders this at 52px tall) -->
  <defs>
    <radialGradient id="crestBg" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#1e2d4d"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </radialGradient>
    <filter id="crestShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
    <!-- Bottom-hugging text arc: radius 70, centered on the crest's bottom
         point (110,180), spanning ±50° either side of straight-down. -->
    <path id="crestArc" d="M 56.4 155 A 70 70 0 0 0 163.6 155" fill="none"/>
  </defs>

  <!-- outer ring -->
  <circle cx="110" cy="110" r="102" fill="url(#crestBg)" stroke="#f97316" stroke-width="7" filter="url(#crestShadow)"/>
  <!-- inner hairline ring -->
  <circle cx="110" cy="110" r="90" fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.35"/>

  <!-- basketball -->
  <g>
    <circle cx="110" cy="70" r="29" fill="#f97316"/>
    <circle cx="110" cy="70" r="29" fill="none" stroke="#9a3412" stroke-width="1.8"/>
    <line x1="81" y1="70" x2="139" y2="70" stroke="#9a3412" stroke-width="1.6"/>
    <path d="M110 41 Q92 70 110 99" fill="none" stroke="#9a3412" stroke-width="1.6"/>
    <path d="M110 41 Q128 70 110 99" fill="none" stroke="#9a3412" stroke-width="1.6"/>
  </g>

  <!-- 82-0 -->
  <text x="110" y="143" text-anchor="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900" font-size="46" letter-spacing="-2" fill="#f5efe1">82-0</text>

  <!-- curved EST. 2025 -->
  <text font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="700" font-size="12" letter-spacing="3.5" fill="#f97316">
    <textPath href="#crestArc" startOffset="50%" text-anchor="middle">EST. 2025</textPath>
  </text>
</svg>
