<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 148">
  <!-- Drop shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Outer shield -->
  <path d="M60 5 L112 26 L112 78 Q112 118 60 143 Q8 118 8 78 L8 26 Z"
    fill="#1a2744" stroke="#f97316" stroke-width="4" stroke-linejoin="round"
    filter="url(#shadow)"/>

  <!-- Inner shield detail -->
  <path d="M60 13 L104 32 L104 78 Q104 113 60 134 Q16 113 16 78 L16 32 Z"
    fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.3"/>

  <!-- Top accent line -->
  <line x1="36" y1="30" x2="84" y2="30" stroke="#f97316" stroke-width="1" opacity="0.45"/>

  <!-- Basketball -->
  <circle cx="60" cy="58" r="22" fill="#f97316"/>
  <circle cx="60" cy="58" r="22" fill="none" stroke="#b45309" stroke-width="2"/>
  <!-- Vertical seam -->
  <line x1="60" y1="36" x2="60" y2="80" stroke="#b45309" stroke-width="1.8"/>
  <!-- Horizontal seam curves -->
  <path d="M38 58 Q60 50 82 58" fill="none" stroke="#b45309" stroke-width="1.8"/>
  <path d="M38 58 Q60 66 82 58" fill="none" stroke="#b45309" stroke-width="1.8"/>

  <!-- "82-0" -->
  <text x="60" y="107"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="28" font-weight="900" fill="#ffffff"
    text-anchor="middle" letter-spacing="-1">82-0</text>

  <!-- Divider -->
  <line x1="32" y1="116" x2="88" y2="116" stroke="#f97316" stroke-width="1.5" opacity="0.7"/>

  <!-- EST. 2025 -->
  <text x="60" y="130"
    font-family="Arial,sans-serif"
    font-size="9" font-weight="700" fill="#f97316"
    text-anchor="middle" letter-spacing="3.5">EST. 2025</text>
</svg>
