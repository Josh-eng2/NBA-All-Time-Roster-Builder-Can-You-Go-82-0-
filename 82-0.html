  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<body>

<div id="loading-overlay" style="
  position:fixed;inset:0;background:#f8fafc;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Fira Sans',sans-serif;color:#0f172a;z-index:9999">
  <div style="width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#2563eb;
    border-radius:50%;animation:_spin 0.7s linear infinite"></div>
  <p style="margin-top:16px;font-size:14px;color:#64748b;letter-spacing:0.02em">Loading players…</p>
  <style>@keyframes _spin{to{transform:rotate(360deg)}}</style>
</div>

<div id="app"></div>

<script>
'use strict';

// ╔══════════════════════════════════════════════════════════════════════════════╗
// ║  DATABASE LOADER                                                             ║
// ║                                                                             ║
// ║  DB is populated asynchronously from players.json at boot.                  ║
// ║  render() is called by loadDatabase() once the data is ready.               ║
// ╚══════════════════════════════════════════════════════════════════════════════╝

let DB = null;

function loadDatabase() {
  const overlay = document.getElementById('loading-overlay');

  return fetch('players.json')
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then(data => {
      DB = data;
      if (overlay) overlay.remove();
      render();
    })
    .catch(err => {
      if (overlay) overlay.innerHTML = `
        <p style="color:#ef4444;font-weight:700;font-size:15px">Failed to load player data</p>
        <p style="color:#a1a1aa;font-size:12px;margin-top:4px">${err.message}</p>
        <button onclick="loadDatabase()"
          style="margin-top:16px;padding:8px 20px;background:#f97316;color:#fff;
                 border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px">
          Retry
        </button>`;
    });
}

</script>
<script>
'use strict';

// ╔══════════════════════════════════════════════════════════════════════════════╗
// ║  SIMULATION ENGINE                                                          ║
// ║                                                                             ║
// ║  Starters (78%) vs bench (22%), each against own baseline.                 ║
// ║  Chemistry bonuses/penalties applied before the sigmoid win curve.         ║
// ╚══════════════════════════════════════════════════════════════════════════════╝

// ── Sigmoid tuning knobs ──────────────────────────────────────────────────────
// SIM_K:      steepness — higher = more decisive gap between good and bad teams
// SIM_CENTER: the adjustedStrength value that maps to exactly 50% win rate;
//             raise this (e.g. 1.22) to make 82-0 rarer, lower to make it easier
// WIN_CAP:    hard ceiling — prevents a mathematically guaranteed perfect season
const SIM_K      = 15;
const SIM_CENTER = 1.18;
const WIN_CAP    = 0.965;

// ── Dynamic baselines derived from the live DB ────────────────────────────────
// Rather than hardcoding STARTER_BASE / BENCH_BASE, we sort all players by
// composite score and treat the top 62.5% (5 of 8 roster spots) as the starter
// tier.  The means auto-adjust whenever players are added or stats change.
function computeSimBaselines() {
  const all   = Object.values(DB).flat();
  const score = p => p.ppg*0.35 + p.rpg*0.20 + p.apg*0.20 + p.spg*0.15 + p.bpg*0.10;
  const sorted = [...all].sort((a, b) => score(b) - score(a));
  const cut    = Math.round(sorted.length * 5 / 8);
  const sTier  = sorted.slice(0, cut);
  const bTier  = sorted.slice(cut);
  const avg    = (arr, stat) => arr.reduce((s, p) => s + p[stat], 0) / arr.length;
  const STATS  = ['ppg', 'rpg', 'apg', 'spg', 'bpg'];
  return {
    STARTER_BASE: Object.fromEntries(STATS.map(k => [k, avg(sTier, k) * 5])),
    BENCH_BASE:   Object.fromEntries(STATS.map(k => [k, avg(bTier, k) * 3])),
  };
}

function calculateChemistry(starters, bench) {
  const allPlayers = [...starters, ...bench];
  const sA = starters.map(p => p.archetype || '');
  const bA = bench.map(p => p.archetype || '');
  const aA = [...sA, ...bA];

  const sHasPlaymaker    = sA.includes('Playmaker');
  const sHasSharpshooter = sA.includes('Sharpshooter');
  const sHasPaintBeast   = sA.includes('Paint Beast');
  const sHasLockdown     = sA.includes('Lockdown Defender');
  const aHasPlaymaker    = aA.includes('Playmaker');
  const aHasSharpshooter = aA.includes('Sharpshooter');
  const aHasPaintBeast   = aA.includes('Paint Beast');
  const aHasLockdown     = aA.includes('Lockdown Defender');
  const aSharpCount      = aA.filter(a => a === 'Sharpshooter').length;
  const sSlashPaintCount = sA.filter(a => a === 'Slasher' || a === 'Paint Beast').length;
  const aSlashPaintCount = aA.filter(a => a === 'Slasher' || a === 'Paint Beast').length;
  const sDemandCount     = sA.filter(a => a === 'Two-Way Star' || a === 'Playmaker').length;

  const coach = (typeof S !== 'undefined' && S.coach) ? S.coach : null;

  let chemBonus = 0;
  const chemReport = [];

  // ── SYNERGIES (Buffed and Improved) ──
  if (sHasPlaymaker && sHasSharpshooter) {
    chemBonus += 0.10;
    chemReport.push('🟢 Drive & Kick (Elite ×1.5): Starter Playmaker feeds Starter Shooters (+10%)');
  } else if (aHasPlaymaker && aHasSharpshooter) {
    chemBonus += 0.07;
    chemReport.push('🟢 Drive & Kick: Playmaker feeds the shooters (+7%)');
  }

  if (sHasPaintBeast && sHasLockdown) {
    const bonus = coach === 'auerbach' ? 0.14 : 0.10;
    chemBonus += bonus;
    chemReport.push(`🟢 Twin Towers (Elite ×1.5)${coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: Interior dominance in the Starting 5 (+${Math.round(bonus * 100)}%)`);
  } else if (aHasPaintBeast && aHasLockdown) {
    const bonus = coach === 'auerbach' ? 0.10 : 0.07;
    chemBonus += bonus;
    chemReport.push(`🟢 Twin Towers${coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: Interior dominance on both ends (+${Math.round(bonus * 100)}%)`);
  }

  if (sHasPlaymaker && sHasPaintBeast) {
    chemBonus += 0.10;
    chemReport.push('🟢 Pick & Roll Maestros (Elite ×1.5): Classic screen-and-roll starting duo (+10%)');
  } else if (aHasPlaymaker && aHasPaintBeast) {
    chemBonus += 0.07;
    chemReport.push('🟢 Pick & Roll Maestros: Playmaker and Paint Beast asset tracking (+7%)');
  }

  if (sHasPlaymaker && aSharpCount >= 2) {
    const bonus = coach === 'popovich' ? 0.12 : coach === 'kerr' ? 0.11 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Floor General${coach === 'popovich' ? ' ⭐ Pop' : coach === 'kerr' ? ' ⭐ Kerr' : ''}: Starter Playmaker unlocks multiple shooters (+${Math.round(bonus * 100)}%)`);
  }

  const defAnchor = starters.find(p => (p.archetype === 'Lockdown Defender' || p.archetype === 'Paint Beast') && (p.spg + p.bpg) >= 2.5);
  if (defAnchor) {
    const bonus = coach === 'auerbach' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Defensive Anchor${coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: ${defAnchor.name.split(' ').pop()} anchors the defense (+${Math.round(bonus * 100)}%)`);
  }

  const sLockdownCount = sA.filter(a => a === 'Lockdown Defender').length;
  if (sLockdownCount >= 2) {
    const bonus = coach === 'auerbach' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Perimeter Lockdown${coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: Multiple locking wings in the Starting 5 (+${Math.round(bonus * 100)}%)`);
  }

  const aSlasherCount = aA.filter(a => a === 'Slasher').length;
  if (aHasPlaymaker && aSlasherCount >= 2) {
    const bonus = coach === 'kerr' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Pace & Space Blitz${coach === 'kerr' ? ' ⭐ Kerr' : ''}: High transition attack engine ready (+${Math.round(bonus * 100)}%)`);
  }

  if (aSharpCount >= 3) {
    const bonus = coach === 'kerr' ? 0.105 : 0.07;
    chemBonus += bonus;
    chemReport.push(`🟢 Small Ball Heat${coach === 'kerr' ? ' ⭐ Kerr' : ''}: Spacing overload with 3+ shooters on the roster (+${+(bonus * 100).toFixed(1)}%)`);
  }

  const sixthMan = bench.find(p => p.ppg > 18.0);
  if (sixthMan) {
    const bonus = coach === 'popovich' ? 0.09 : 0.06;
    chemBonus += bonus;
    chemReport.push(`🟢 Sixth Man Spark${coach === 'popovich' ? ' ⭐ Pop' : ''}: ${sixthMan.name.split(' ').pop()} provides elite scoring off the bench (+${Math.round(bonus * 100)}%)`);
  }

  const stretchBig = starters.find(p => (p.pos === 'C' || p.pos === 'PF') && p.archetype === 'Sharpshooter');
  if (stretchBig) {
    const bonus = coach === 'kerr' ? 0.10 : 0.07;
    chemBonus += bonus;
    chemReport.push(`🟢 Stretch Five Dynamic${coach === 'kerr' ? ' ⭐ Kerr' : ''}: ${stretchBig.name.split(' ').pop()} opens up the interior lane (+${Math.round(bonus * 100)}%)`);
  }

  const showtimePG = starters.find(p => p.archetype === 'Playmaker' && p.apg > 7.0);
  const showtimeSlasher = starters.find(p => p.archetype === 'Slasher' && p.ppg > 22.0);
  if (showtimePG && showtimeSlasher) {
    const bonus = coach === 'riley' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Showtime Transition${coach === 'riley' ? ' ⭐ Riley' : ''}: Fast break baseline fully synchronized (+${Math.round(bonus * 100)}%)`);
  }

  const teamCounts = {};
  for (const p of allPlayers) {
    if (p.team) teamCounts[p.team] = (teamCounts[p.team] || 0) + 1;
  }
  if (Object.values(teamCounts).some(count => count >= 3)) {
    chemBonus += 0.07;
    chemReport.push('🟢 Franchise Loyalty: Shared franchise structure yields chemistry boost (+7%)');
  }

  const aLockdownCount = aA.filter(a => a === 'Lockdown Defender').length;
  if (aLockdownCount >= 3) {
    const bonus = (coach === 'riley' || coach === 'auerbach') ? 0.135 : 0.09;
    chemBonus += bonus;
    chemReport.push(`🟢 All-Defensive Team${coach === 'riley' ? ' ⭐ Riley' : coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: High baseline lock pressure across roster (+${+(bonus * 100).toFixed(1)}%)`);
  }

  const helioPG = starters.find(p => p.archetype === 'Playmaker' && p.apg > 9.0);
  const otherStartersScoring = starters.filter(p => p.archetype !== 'Playmaker' && p.ppg > 16.0);
  if (helioPG && starters.filter(p => p.archetype === 'Playmaker').length === 1 && otherStartersScoring.length === 4) {
    const bonus = coach === 'jackson' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Heliocentric Engine${coach === 'jackson' ? ' ⭐ Triangle' : ''}: System centered cleanly around ${helioPG.name.split(' ').pop()} (+${Math.round(bonus * 100)}%)`);
  }

  const startingPF = starters.find(p => p.pos === 'PF');
  const startingC  = starters.find(p => p.pos === 'C');
  if (startingPF?.archetype === 'Paint Beast' && startingC?.archetype === 'Paint Beast') {
    const bonus = coach === 'auerbach' ? 0.10 : 0.07;
    chemBonus += bonus;
    chemReport.push(`🟢 Bully Ball Frontcourt${coach === 'auerbach' ? ' ⭐ Auerbach' : ''}: Combined paint beasts completely overwhelm low blocks (+${Math.round(bonus * 100)}%)`);
  }

  const eliteScorers = starters.filter(p => p.ppg > 26.0);
  if (eliteScorers.length >= 2) {
    const bonus = coach === 'jackson' ? 0.12 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Dynamic Duo${coach === 'jackson' ? ' ⭐ Triangle' : ''}: Explosive baseline tandem active (+${Math.round(bonus * 100)}%)`);
  }

  const pfCBlocks = starters.filter(p => p.pos === 'PF' || p.pos === 'C').reduce((sum, p) => sum + p.bpg, 0);
  if (starters.filter(p => p.pos === 'PF' || p.pos === 'C').length === 2 && pfCBlocks >= 3.5) {
    chemBonus += 0.07;
    chemReport.push('🟢 Paint Patrol: Defensive interior blocks active (+7%)');
  }

  if (bench.some(p => p.archetype === 'Playmaker')) {
    const bonus = coach === 'popovich' ? 0.09 : 0.06;
    chemBonus += bonus;
    chemReport.push(`🟢 Second Unit General${coach === 'popovich' ? ' ⭐ Pop' : ''}: Secondary unit run by a natural Playmaker (+${Math.round(bonus * 100)}%)`);
  }

  if (aSharpCount >= 2 && aLockdownCount >= 2) {
    const bonus = coach === 'kerr' ? 0.11 : 0.08;
    chemBonus += bonus;
    chemReport.push(`🟢 Three-and-D Paradigm${coach === 'kerr' ? ' ⭐ Kerr' : ''}: Flawless modern floor symmetry (+${Math.round(bonus * 100)}%)`);
  }

  const sPerimSteals = starters.filter(p => p.pos === 'PG' || p.pos === 'SG').reduce((sum, p) => sum + p.spg, 0);
  if (starters.filter(p => p.pos === 'PG' || p.pos === 'SG').length === 2 && sPerimSteals >= 3.6) {
    chemBonus += 0.07;
    chemReport.push('🟢 Perimeter Clamps: Stifling backcourt on-ball pressure (+7%)');
  }

  // ── PENALTIES ──
  if (aSlashPaintCount >= 3 && !aHasSharpshooter) {
    const penalty = sSlashPaintCount >= 3 ? 0.06 : 0.04;
    chemBonus -= penalty;
    chemReport.push(`🔴 No Spacing: Too many paint-cloggers, no shooters (-${Math.round(penalty * 100)}%)`);
  }

  if (sDemandCount >= 3) {
    const penalty = coach === 'jackson' ? 0.02 : 0.05;
    chemBonus -= penalty;
    chemReport.push(`🔴 Clashing Egos${coach === 'jackson' ? ' (softened by Phil)' : ''}: Too many ball-dominant players in the Starting 5 (-${Math.round(penalty * 100)}%)`);
  }

  if (!aHasPlaymaker) {
    chemBonus -= 0.05;
    chemReport.push('🔴 No Playmaking: Zero Playmakers on the roster — no one to run the offense (-5%)');
  }

  if (coach !== 'riley' && coach !== 'auerbach') {
    const defLiabilityCount = starters.filter(p => (p.spg + p.bpg) < 1.5).length;
    if (defLiabilityCount >= 3) {
      chemBonus -= 0.02;
      chemReport.push('🔴 Defensive Liability: 3+ starters have weak defensive stats (-2%)');
    }
  }

  const startingC_Reb = starters.find(p => p.pos === 'C');
  if (!aHasPaintBeast && startingC_Reb && startingC_Reb.rpg < 8.0) {
    chemBonus -= 0.05;
    chemReport.push('🔴 Rebounding Crisis: Missing length/boards inside paint (-5%)');
  }

  if (sSlashPaintCount >= 3 && sDemandCount >= 3) {
    chemBonus -= 0.05;
    chemReport.push('🔴 Ball Stoppers: Isolation overlaps halt ball movement (-5%)');
  }

  const sFrontcourt    = starters.filter(p => p.pos === 'SF' || p.pos === 'PF' || p.pos === 'C');
  const hasFrontDefend = sFrontcourt.some(
    p => p.archetype === 'Lockdown Defender' || p.archetype === 'Paint Beast'
  );
  if (sFrontcourt.length === 3 && !hasFrontDefend) {
    const penalty = coach === 'kerr' ? 0.08 : coach === 'auerbach' ? 0.09 : 0.05;
    chemBonus -= penalty;
    chemReport.push(`🔴 Defensive Sieve${coach === 'kerr' ? ' (heightened by Kerr)' : coach === 'auerbach' ? ' (critical for Auerbach)' : ''}: Starting frontcourt offers zero rim/wing protection (-${Math.round(penalty * 100)}%)`);
  }

  const highUsageCount = starters.filter(p => p.ppg > 25.0 && p.apg < 5.0).length;
  if (highUsageCount >= 3) {
    chemBonus -= 0.05;
    chemReport.push('🔴 High Usage Overlap: 3+ starters average >25.0 PPG but <5.0 APG, stalling ball movement (-5%)');
  }

  const perimSlotsFilled = starters.filter(p => p.pos === 'PG' || p.pos === 'SG' || p.pos === 'SF').length;
  const perimWeakCount = starters.filter(p => (p.pos === 'PG' || p.pos === 'SG' || p.pos === 'SF') && p.rpg < 4.5).length;
  if (perimSlotsFilled === 3 && perimWeakCount === 3) {
    chemBonus -= 0.04;
    chemReport.push('🔴 Small Ball Weakness: Perimeter group struggles on defensive boards (-4%)');
  }

  const weakScoringStarters = starters.filter(p => p.ppg < 12.0).length;
  if (weakScoringStarters >= 3) {
    chemBonus -= 0.05;
    chemReport.push('🔴 Offensive Black Hole: 3+ starters average under 12.0 PPG, killing floor gravity (-5%)');
  }

  if (coach !== 'auerbach') {
    const pfcBlocksLow = starters
      .filter(p => p.pos === 'PF' || p.pos === 'C')
      .reduce((sum, p) => sum + p.bpg, 0);
    if (starters.filter(p => p.pos === 'PF' || p.pos === 'C').length === 2 && pfcBlocksLow < 1.5) {
      chemBonus -= 0.05;
      chemReport.push('🔴 No Paint Protection: Frontcourt blocks fall below 1.5 BPG (-5%)');
    }
  }

  if (coach !== 'popovich' && (starters.length + bench.length) === 8) {
    const benchTotalPpg = bench.reduce((sum, p) => sum + p.ppg, 0);
    if (benchTotalPpg < 32.0) {
      chemBonus -= 0.04;
      chemReport.push(`🔴 Barren Bench: Bench combines for only ${benchTotalPpg.toFixed(1)} PPG — starters can't rest (-4%)`);
    }
  }

  const chemScore = Math.round(Math.max(0, Math.min(100, 70 + (chemBonus / 0.60) * 30)));
  return { chemBonus, chemScore, chemReport };
}

function simulateSeason(starters, bench, coach = null) {
  const sumStats = arr => arr.reduce(
    (acc, p) => ({ ppg: acc.ppg+p.ppg, rpg: acc.rpg+p.rpg,
                   apg: acc.apg+p.apg, spg: acc.spg+p.spg, bpg: acc.bpg+p.bpg }),
    { ppg:0, rpg:0, apg:0, spg:0, bpg:0 }
  );

  const sTotals = sumStats(starters);
  const bTotals = sumStats(bench);

  const { STARTER_BASE, BENCH_BASE } = computeSimBaselines();

  const sRatio = {
    ppg: sTotals.ppg / STARTER_BASE.ppg,
    rpg: sTotals.rpg / STARTER_BASE.rpg,
    apg: sTotals.apg / STARTER_BASE.apg,
    spg: sTotals.spg / STARTER_BASE.spg,
    bpg: sTotals.bpg / STARTER_BASE.bpg,
  };
  const bRatio = {
    ppg: bTotals.ppg / BENCH_BASE.ppg,
    rpg: bTotals.rpg / BENCH_BASE.rpg,
    apg: bTotals.apg / BENCH_BASE.apg,
    spg: bTotals.spg / BENCH_BASE.spg,
    bpg: bTotals.bpg / BENCH_BASE.bpg,
  };

  const SW = 0.78, BW = 0.22;
  const ratio = {
    ppg: sRatio.ppg * SW + bRatio.ppg * BW,
    rpg: sRatio.rpg * SW + bRatio.rpg * BW,
    apg: sRatio.apg * SW + bRatio.apg * BW,
    spg: sRatio.spg * SW + bRatio.spg * BW,
    bpg: sRatio.bpg * SW + bRatio.bpg * BW,
  };

  const strength =
    ratio.ppg * 0.35 +
    ratio.rpg * 0.20 +
    ratio.apg * 0.20 +
    ratio.spg * 0.15 +
    ratio.bpg * 0.10;

  const minStarterRatio = Math.min(...Object.values(sRatio));
  const balancePenalty  = minStarterRatio < 0.80 ? (0.80 - minStarterRatio) * 0.6 : 0;

  const { chemBonus, chemScore, chemReport } = calculateChemistry(starters, bench, coach);

  let coachBoost = 0;
  const allForCoach = [...starters, ...bench];
  if (coach === 'jackson') {
    coachBoost = 0.025;
  } else if (coach === 'popovich') {
    coachBoost = 0.020;
  } else if (coach === 'auerbach') {
    const defCount = allForCoach.filter(p => p.archetype === 'Lockdown Defender' || p.archetype === 'Paint Beast').length;
    coachBoost = Math.min(0.06, defCount * 0.012);
  } else if (coach === 'riley') {
    const avgDef = allForCoach.reduce((s, p) => s + p.spg + p.bpg, 0) / (allForCoach.length || 1);
    coachBoost = Math.min(0.05, avgDef * 0.012);
  } else if (coach === 'kerr') {
    const shooterCount = allForCoach.filter(p => p.archetype === 'Sharpshooter').length;
    coachBoost = Math.min(0.05, shooterCount * 0.010);
  }

  const baseStrength = Math.max(0, strength - balancePenalty + chemBonus + coachBoost);

  const POP_FLOOR = 35, POP_CEIL = 100, MUL_MIN = 0.95, MUL_MAX = 1.08;
  const allPlayers = [...starters, ...bench];
  const avgPop  = allPlayers.length
    ? allPlayers.reduce((s, p) => s + (p.popularity || 50), 0) / allPlayers.length
    : 50;
  const popNorm = Math.max(0, Math.min(1, (avgPop - POP_FLOOR) / (POP_CEIL - POP_FLOOR)));
  const popMul  = MUL_MIN + popNorm * (MUL_MAX - MUL_MIN);
  const adjustedStrength = baseStrength * popMul;
  const popEloDelta = +(baseStrength * (popMul - 1)).toFixed(3);
  const fansM = +(Math.pow(popNorm, 1.5) * 38 + 2).toFixed(1);

  const baseWinPct = Math.min(WIN_CAP, 1 / (1 + Math.exp(-SIM_K * (adjustedStrength - SIM_CENTER))));
  const competitiveFactor = Math.max(0, 1 - Math.abs(baseWinPct - 0.5) * 5);
  const clutchBoost = competitiveFactor * (popNorm - 0.4) * 0.04;
  const winPct = Math.min(WIN_CAP, Math.max(0, baseWinPct + clutchBoost));

  let wins = 0;
  for (let i = 0; i < 82; i++) { if (Math.random() < winPct) wins++; }
  wins = Math.max(0, Math.min(82, wins));

  const totals = {
    ppg: sTotals.ppg + bTotals.ppg,
    rpg: sTotals.rpg + bTotals.rpg,
    apg: sTotals.apg + bTotals.apg,
    spg: sTotals.spg + bTotals.spg,
    bpg: sTotals.bpg + bTotals.bpg,
  };

  return {
    wins, losses: 82 - wins,
    winPct:  +(winPct * 100).toFixed(1),
    strength: +adjustedStrength.toFixed(3),
    baseStrength: +baseStrength.toFixed(3),
    totals, ratio, sTotals, bTotals,
    chemScore, chemReport,
    avgPopularity: +avgPop.toFixed(1),
    popEloDelta,
    fansM,
    coachBoost: +coachBoost.toFixed(3),
  };
}

function simulateSeries(playerStrength, opponentStrength) {
  const pWin = 1 / (1 + Math.exp(-14 * (playerStrength - opponentStrength)));
  let playerWins = 0, oppWins = 0;
  const games = [];
  while (playerWins < 4 && oppWins < 4) {
    const won = Math.random() < pWin;
    if (won) playerWins++; else oppWins++;
    games.push(won ? 'W' : 'L');
  }
  return { playerWins, oppWins, games, won: playerWins === 4 };
}

  const cpuSorted = [...CPU_TEAMS].sort((a, b) => b.strength - a.strength);

  for (let i = 0; i < 8; i++) {
    if (!seeds[i]) {
      seeds[i] = { ...cpuSorted[cpuIdx++], isPlayer: false };
    }
  }
  // Matchups: 1v8, 2v7, 3v6, 4v5
  return [

  if (S.selectedEra && S.selectedEra !== 'all') return [S.selectedEra];

function spinResult(fixedTeam = null, fixedDecade = null) {
  const decadePool = availableDecades();
  if (!decadePool.length) return null;

  const decades = fixedDecade ? [fixedDecade] : decadePool;
  const teams   = fixedTeam   ? [fixedTeam]   : TEAMS;

  // Build every valid (team, decade) pair up front — no retry loop needed
  const valid = [];
  for (const d of decades) {
    for (const t of teams) {
      if (getAvailablePlayers(t, d).length > 0) valid.push({ team: t, decade: d });
    }
  }
  if (valid.length) return pick(valid);

  // Constraint (fixedTeam or fixedDecade) exhausted — expand to any remaining combo
  const fallback = [];
  for (const d of decadePool) {
    for (const t of TEAMS) {
      if (getAvailablePlayers(t, d).length > 0) fallback.push({ team: t, decade: d });

  }
  return fallback.length ? pick(fallback) : null;

      ${Array.from({length: TOTAL_ROUNDS}, (_, i) => {
        const isStarter = i < 5;
        const done      = i < S.round;
        const active    = i === S.round;
        const color     = done ? (isStarter ? '#2563eb' : '#64748b') : active ? (isStarter ? '#2563eb' : '#64748b') : '#e2e8f0';
        const opacity   = done || active ? 1 : 1;
        return `<div class="rounded-full transition-all" style="width:${active ? 9 : 7}px;height:${active ? 9 : 7}px;background:${color};border:${active ? '2px solid ' + (isStarter ? '#2563eb' : '#64748b') : 'none'}"></div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderPopularityBar() {
  const drafted = Object.values(S.roster).filter(Boolean);
  if (drafted.length === 0) return '';
  const avgPop  = drafted.reduce((s, p) => s + (p.popularity || 50), 0) / drafted.length;
  const pct     = Math.max(0, Math.round(((avgPop - 35) / 65) * 100));
  const barCol  = avgPop >= 80 ? '#2563eb' : avgPop >= 60 ? '#d97706' : '#94a3b8';
  const tier    = avgPop >= 85 ? 'Superstar Lineup' : avgPop >= 70 ? 'Star Power' : avgPop >= 55 ? 'Solid Roster' : 'Under the Radar';
  return `
  <div class="rounded-xl border border-border bg-card px-4 py-3 card-shadow">
    <div class="flex items-center justify-between mb-2">
      <p class="text-[10px] font-bold uppercase tracking-widest text-muted-fg">Team Popularity</p>
      <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border" style="color:${barCol};background:${barCol}18;border-color:${barCol}30">${tier} · ${Math.round(avgPop)}/100</span>
    </div>
    <div class="h-1.5 rounded-full overflow-hidden bg-border">
      <div class="h-full rounded-full transition-all stat-bar-fill" style="width:${pct}%;background:${barCol}"></div>
    </div>
    <p class="text-[10px] mt-1.5 text-muted-fg">High popularity boosts home-court advantage in close games</p>
  </div>`;
}

function renderSlotMachine() {
  const isDone    = S.spinState === 'done';
  const isSpin    = S.spinState === 'spinning';
  const tc        = isDone ? TEAM_COLORS[S.currentSpin.team] : null;
  const eraLocked = S.selectedEra && S.selectedEra !== 'all';

  return `
  <div class="rounded-2xl border border-border bg-card p-4 animate-scale-in card-shadow">
    <div class="flex items-center gap-2 mb-3">
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">Draft Board — Round ${S.round + 1}</p>
      <div class="ml-auto flex gap-1.5">
        ${isDone && S.teamSkips > 0 ? `<button data-action="skip-team" class="text-[11px] px-2.5 py-1 rounded-full border border-border bg-card2 text-muted-fg hover:border-primary hover:text-primary transition-all cursor-pointer">Skip Team (${S.teamSkips})</button>` : ''}
        ${isDone && S.decadeSkips > 0 && !eraLocked ? `<button data-action="skip-decade" class="text-[11px] px-2.5 py-1 rounded-full border border-border bg-card2 text-muted-fg hover:border-primary hover:text-primary transition-all cursor-pointer">Skip Era (${S.decadeSkips})</button>` : ''}
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4 ${isSpin ? 'slot-spinning' : ''}">
      <div class="rounded-xl border-2 p-4 flex flex-col items-center justify-center min-h-[88px] transition-all"
        style="background:${isDone && tc ? tc.bg+'12' : '#f1f5f9'};border-color:${isDone && tc ? tc.bg+'88' : '#e2e8f0'}">
        <span class="text-[10px] font-bold uppercase tracking-widest mb-2 text-muted-fg">TEAM</span>
        <span class="slot-badge text-xl font-black text-foreground" id="slot-team">
          ${isDone ? S.currentSpin.team : isSpin ? pick(TEAMS) : '—'}
        </span>
        ${isDone ? `<span class="mt-2 text-[10px] font-bold px-2 py-0.5 rounded-full bg-primary text-white uppercase tracking-wider">LOCKED</span>` : ''}
      </div>
      <div class="rounded-xl border-2 p-4 flex flex-col items-center justify-center min-h-[88px] transition-all"
        style="background:${isDone ? '#eff6ff' : '#f1f5f9'};border-color:${isDone ? '#93c5fd' : '#e2e8f0'}">
        <span class="text-[10px] font-bold uppercase tracking-widest mb-2 text-muted-fg">ERA</span>
        <span class="slot-badge text-xl font-black text-foreground" id="slot-decade">
          ${isDone ? S.currentSpin.decade : isSpin ? (eraLocked ? S.selectedEra : pick(availableDecades())) : '—'}
        </span>
        ${isDone ? `<span class="mt-2 text-[10px] font-bold px-2 py-0.5 rounded-full bg-primary text-white uppercase tracking-wider">LOCKED</span>` : ''}
      </div>
    </div>

    ${S.spinState === 'idle' ? `
      <button data-action="spin" class="w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest bg-primary text-white hover:bg-blue-700 transition-all cursor-pointer animate-pulse-glow">
        SPIN THE DRAFT BOARD
      </button>
    ` : S.spinState === 'spinning' ? `
      <button disabled class="w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest bg-primary/70 text-white cursor-not-allowed">
        SPINNING...
      </button>
    ` : `
      <p class="text-center text-xs text-muted-fg py-1">Select a player below, then tap a roster slot to place them</p>
      ${S.hasMulligan ? `
        <button data-action="use-mulligan"
          class="mt-2 w-full py-2.5 rounded-xl font-bold text-sm border-2 border-dashed border-emerald-300 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 transition-all cursor-pointer">
          🎲 Use Mulligan <span class="font-normal text-emerald-500 text-xs">(1 Remaining)</span>
        </button>
      ` : ''}
    `}
  </div>`;
}

// ── Player pool ────────────────────────────────────────────────────────────────
function renderPlayerPool() {
  if (!S.availablePlayers.length) return '';
  const team   = S.currentSpin?.team;
  const decade = S.currentSpin?.decade;
  const tc     = team ? TEAM_COLORS[team] : null;
  return `
  <div class="animate-fade-up">
    <div class="flex items-center gap-2 mb-3">
      ${tc ? `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${tc.bg}"></span>` : ''}
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">${team} · ${decade}</p>
    </div>
    <div class="flex flex-col gap-2">
      ${S.availablePlayers.map(p => renderPlayerCard(p)).join('')}
    </div>
  </div>`;
}

function renderDraftBoard() {
  if (!S.draftBoard || !S.draftBoard.length) return '';
  const team   = S.currentSpin?.team;
  const decade = S.currentSpin?.decade;
  const tc     = team ? TEAM_COLORS[team] : null;
  return `
  <div class="animate-fade-up">
    <div class="flex items-center gap-2 mb-3">
      ${tc ? `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${tc.bg}"></span>` : ''}
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">${team} · ${decade}</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      ${S.draftBoard.map((p, i) => renderDraftCard(p, i)).join('')}
    </div>
  </div>`;
}

function renderDraftCard(p, index) {
  const pop        = p.popularity ?? 50;
  const popCol     = pop >= 80 ? '#2563eb' : pop >= 60 ? '#d97706' : '#94a3b8';
  const isSelected = S.selectedPlayer?.id === p.id;
  const cardBorder = isSelected ? '#2563eb' : '#e2e8f0';
  const cardBg     = isSelected ? '#eff6ff' : '#ffffff';
  return `
  <div class="rounded-xl border-2 flex flex-col overflow-hidden transition-all card-shadow"
    style="border-color:${cardBorder};background:${cardBg}">
    <div class="p-3 flex-1">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="text-[10px] font-black px-1.5 py-0.5 rounded-full border border-border bg-card2 text-muted-fg">${p.pos}</span>
        ${archetypeBadge(p.archetype)}
        <span class="ml-auto text-xs font-black" style="color:${popCol}">★ ${pop}</span>
      </div>
      <p class="font-bold text-sm text-foreground leading-tight mb-1.5">${p.name}</p>
      <div class="flex flex-wrap gap-x-2 gap-y-0.5">
        ${[['PPG',p.ppg],['RPG',p.rpg],['APG',p.apg],['SPG',p.spg],['BPG',p.bpg]].map(([l,v])=>`
          <span class="text-[10px] text-muted-fg"><span class="font-semibold text-foreground">${v}</span> ${l}</span>
        `).join('')}
      </div>
      ${p.traits && p.traits.length ? `
        <div class="flex flex-wrap gap-1 mt-1.5">
          ${p.traits.map(t => `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200">${t}</span>`).join('')}
        </div>` : ''}
    </div>
    <div class="px-3 pb-3">
      <button data-action="draft-pick-${index}"
        class="w-full py-2 rounded-lg font-bold text-xs transition-all cursor-pointer"
        style="background:${isSelected ? '#2563eb' : '#eff6ff'};color:${isSelected ? '#fff' : '#2563eb'};border:1.5px solid ${isSelected ? '#2563eb' : '#bfdbfe'}">
        ${isSelected ? '✓ Selected — Tap a Roster Slot' : 'Draft Player'}
      </button>
    </div>
  </div>`;
}

function renderPlayerCard(p) {
  const sel = S.selectedPlayer?.id === p.id;
  return `
  <div data-action="pick-${p.id}" class="player-card rounded-xl border-2 cursor-pointer p-3 card-shadow ${sel ? 'selected' : ''}"
    style="background:${sel?'#dbeafe':'#ffffff'};border-color:${sel?'#2563eb':'#e2e8f0'}">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 rounded-lg flex items-center justify-center text-xs font-black flex-shrink-0 border"
        style="background:${sel?'#eff6ff':'#f1f5f9'};border-color:${sel?'#bfdbfe':'#e2e8f0'};color:${sel?'#2563eb':'#64748b'}">
        ${p.pos}
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-sm text-foreground truncate">${p.name}</p>
        ${archetypeBadge(p.archetype)}
        <div class="flex flex-wrap gap-x-2 gap-y-0.5 mt-0.5">
          ${[['PPG',p.ppg],['RPG',p.rpg],['APG',p.apg],['SPG',p.spg],['BPG',p.bpg]].map(([l,v])=>`
            <span class="text-xs text-muted-fg"><span class="font-semibold text-foreground">${v}</span> ${l}</span>
          `).join('')}
        </div>
      </div>
      <div class="flex-shrink-0">
        ${sel
          ? `<div class="h-6 w-6 rounded-full bg-primary flex items-center justify-center">${iconCheck('h-3.5 w-3.5 text-white')}</div>`
          : `<div class="h-6 w-6 rounded-full border-2 border-border bg-card2 flex items-center justify-center">${iconPlus('h-3.5 w-3.5 text-muted')}</div>`
        }
      </div>
    </div>
  </div>`;
}

// ── Roster ─────────────────────────────────────────────────────────────────────
function renderRoster() {
  const hasSelected = !!S.selectedPlayer;
  const filledCount = ALL_POSITIONS.filter(p => S.roster[p]).length;
  return `
  <div>
    <div class="flex items-center justify-between mb-2">
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">Your Roster <span class="text-primary">${filledCount}/8</span></p>
      ${hasSelected ? `<p class="text-xs text-primary animate-fade-up font-medium">Tap a slot to place ${S.selectedPlayer.name}</p>` : ''}
    </div>

    <p class="text-[10px] font-bold uppercase tracking-wider text-muted-fg/50 mb-1.5">Starters</p>
    <div class="grid grid-cols-3 sm:grid-cols-5 gap-2 mb-3">
      ${POSITIONS.map(pos => renderRosterSlot(pos, hasSelected, false)).join('')}
    </div>

    <p class="text-[10px] font-bold uppercase tracking-wider text-muted-fg/50 mb-1.5">Bench</p>
    <div class="grid grid-cols-3 gap-2">
      ${BENCH_POSITIONS.map(pos => renderRosterSlot(pos, hasSelected, true)).join('')}
    </div>
  </div>`;
}

function renderRosterSlot(pos, canPlace, isBench) {
  const p       = S.roster[pos];
  const canDrop = canPlace && !p;
  const canSwap = canPlace && !!p;
  const label   = isBench ? 'BN' : pos;
  const filledBorderColor = isBench ? '#cbd5e1' : '#93c5fd';
  const filledBorderTop   = isBench ? '3px solid #94a3b8' : '3px solid #2563eb';
  const filledLabelColor  = isBench ? '#64748b' : '#2563eb';

  if (p) {
    return `
    <div data-action="swap-${pos}"
      class="rounded-xl border bg-white p-2 flex flex-col items-center gap-0.5 text-center overflow-hidden transition-all card-shadow ${canSwap ? 'cursor-pointer hover:border-amber-400' : ''}"
      style="border-color:${filledBorderColor};border-top:${filledBorderTop}" title="${canSwap ? 'Tap to replace' : p.name}">
      <span class="text-[10px] font-black uppercase leading-none" style="color:${filledLabelColor}">${label}</span>
      <span class="text-[11px] font-bold text-foreground leading-tight w-full text-center truncate px-0.5">${p.name.split(' ').pop()}</span>
      <span class="text-[10px] text-muted-fg leading-none">${p.ppg}pt</span>
    </div>`;
  }

  return `
  <div data-action="${canDrop ? 'place-'+pos : ''}"
    class="rounded-xl border-2 border-dashed p-2 flex flex-col items-center gap-1 text-center transition-all ${canDrop ? 'slot-empty droppable' : ''}"
    style="background:${canDrop?'#eff6ff':'#f8fafc'};border-color:${canDrop?'#93c5fd':'#cbd5e1'}">
    <span class="text-[10px] font-black uppercase" style="color:${canDrop?'#2563eb':'#94a3b8'}">${label}</span>
    <span class="text-xs" style="color:${canDrop?'#60a5fa':'#cbd5e1'}">${canDrop ? 'Place' : 'Empty'}</span>
  </div>`;
}

// ── Live Chemistry Dashboard ───────────────────────────────────────────────────
function renderChemDashboard() {
  const starters = POSITIONS.map(p => S.roster[p]).filter(Boolean);
  const bench    = BENCH_POSITIONS.map(p => S.roster[p]).filter(Boolean);
  if (starters.length === 0 && bench.length === 0) {
    return `
    <div class="rounded-2xl border border-border bg-card p-4 card-shadow">
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg mb-2">Live Chemistry</p>
      <p class="text-xs text-muted-fg">Draft your first player to see team chemistry.</p>
    </div>`;
  }
  const { chemScore, chemReport } = calculateChemistry(starters, bench);
  const scoreColor  = chemScore >= 70 ? '#16a34a' : chemScore >= 45 ? '#d97706' : '#dc2626';
  const scoreBg     = chemScore >= 70 ? '#f0fdf4' : chemScore >= 45 ? '#fffbeb' : '#fef2f2';
  const scoreLabel  = chemScore >= 70 ? 'Strong' : chemScore >= 45 ? 'Neutral' : 'Weak';
  return `
  <div class="rounded-2xl border border-border bg-card p-4 card-shadow">
    <div class="flex items-center justify-between mb-3">
      <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">Live Chemistry</p>
      <span class="text-xs font-bold px-2 py-0.5 rounded-full border" style="background:${scoreBg};color:${scoreColor};border-color:${scoreColor}30">${scoreLabel} · ${chemScore}%</span>
    </div>
    <div class="flex items-center gap-3 mb-3">
      <div class="flex-1 h-2 rounded-full overflow-hidden bg-border">
        <div class="h-full rounded-full stat-bar-fill" style="width:${chemScore}%;background:${scoreColor}"></div>
      </div>
    </div>
    ${chemReport.length > 0 ? `
    <div class="flex flex-col gap-1.5">
      ${chemReport.map(item => {
        const isGood = item.startsWith('🟢');
        return `<div class="rounded-lg px-2.5 py-1.5 text-xs font-medium border"
          style="background:${isGood?'#f0fdf4':'#fef2f2'};color:${isGood?'#15803d':'#dc2626'};border-color:${isGood?'#bbf7d0':'#fecaca'}">${item}</div>`;
      }).join('')}
    </div>` : `<p class="text-xs text-muted-fg">No synergies yet — keep drafting.</p>`}
  </div>`;
}

// ── Simulate card ──────────────────────────────────────────────────────────────
function renderSimulateCard() {
  return `
  <div class="rounded-2xl border-2 border-primary bg-white p-5 text-center animate-scale-in card-shadow">
    <div class="flex justify-center mb-3">${iconBall('h-10 w-10 text-primary')}</div>
    <p class="font-black text-lg text-foreground mb-1">Roster Complete</p>
    <p class="text-sm text-muted-fg mb-5">All 8 spots locked in — starters and bench. Time to simulate.</p>
    <button data-action="simulate" class="w-full py-3.5 rounded-xl font-black text-sm uppercase tracking-widest bg-primary text-white hover:bg-blue-700 transition-all cursor-pointer animate-pulse-glow">
      Simulate 82 Games →
    </button>
  </div>`;
}

// ── Results screen ─────────────────────────────────────────────────────────────
function renderResults() {
  const r = S.result;
  const isPerfect  = r.wins === 82;
  const isHistoric = r.wins >= 73;
  const isElite    = r.wins >= 65;
  const isPlayoff  = r.wins >= 50;

  let label, labelColor, labelBg, emoji;
  if (isPerfect)       { label = 'PERFECT SEASON';        labelColor = '#92400e'; labelBg = '#fef3c7'; emoji = '🏆'; }
  else if (isHistoric) { label = 'Historic Season';        labelColor = '#b45309'; labelBg = '#fffbeb'; emoji = '🔥'; }
  else if (isElite)    { label = 'Championship Contender'; labelColor = '#166534'; labelBg = '#f0fdf4'; emoji = '⭐'; }
  else if (isPlayoff)  { label = 'Playoff Contender';      labelColor = '#1e40af'; labelBg = '#eff6ff'; emoji = '✅'; }
  else                 { label = 'Rebuild Required';       labelColor = '#991b1b'; labelBg = '#fef2f2'; emoji = '📋'; }

  const winsColor = isPerfect ? '#d97706' : isHistoric ? '#d97706' : isElite ? '#16a34a' : isPlayoff ? '#2563eb' : '#dc2626';

  const maxes = { ppg:280, rpg:120, apg:75, spg:22, bpg:18 };
  const statBar = (key, lbl, val) => {
    const pct   = Math.min(100, (val / maxes[key]) * 100);
    const color = pct >= 70 ? '#2563eb' : pct >= 45 ? '#d97706' : '#94a3b8';
    return `
    <div>
      <div class="flex justify-between text-xs mb-1.5">
        <span class="text-muted-fg font-medium">${lbl}</span>
        <span class="font-bold text-foreground">${val.toFixed(1)}</span>
      </div>
      <div class="h-1.5 rounded-full bg-border overflow-hidden">
        <div class="h-full rounded-full stat-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  };

  const rosterRow = (p, posLabel, isStarter) => {
    if (!p) return '';
    return `
    <div class="flex items-center gap-3 py-2.5 border-b border-border last:border-0">
      <span class="text-[10px] font-black w-7 flex-shrink-0 ${isStarter ? 'text-primary' : 'text-muted-fg'}">${posLabel}</span>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-sm text-foreground truncate">${p.name}</p>
        <div class="flex items-center gap-1.5 mt-0.5">
          <p class="text-xs text-muted-fg">${p.team || ''} ${p.decade ? fmtDecadeShort(p.decade) : ''}</p>
          ${p.archetype ? archetypeBadge(p.archetype) : ''}
        </div>
      </div>
      <div class="flex gap-3 text-xs text-muted-fg flex-shrink-0">
        <span><span class="font-semibold text-foreground">${p.ppg}</span> PPG</span>
        <span><span class="font-semibold text-foreground">${p.rpg}</span> RPG</span>
        <span class="hidden sm:inline"><span class="font-semibold text-foreground">${p.apg}</span> APG</span>
      </div>
    </div>`;
  };

  const chemReportHtml = r.chemReport && r.chemReport.length > 0
    ? r.chemReport.map(item => {
        const isGood = item.startsWith('🟢');
        return `<div class="rounded-lg px-3 py-2 text-sm font-medium border"
          style="background:${isGood?'#f0fdf4':'#fef2f2'};border-color:${isGood?'#bbf7d0':'#fecaca'};color:${isGood?'#15803d':'#dc2626'}">${item}</div>`;
      }).join('')
    : `<p class="text-sm text-muted-fg py-1">No synergies or penalties — balanced roster.</p>`;

  return `
  <div class="flex flex-col min-h-screen main-gradient">
    ${renderHeader(false)}
    <main class="flex-1 flex flex-col items-center px-4 py-6">
      <div class="w-full max-w-2xl flex flex-col gap-4 animate-fade-up">

        <div class="rounded-2xl border-2 bg-white p-6 text-center card-shadow ${isPerfect ? 'perfect-glow' : ''}"
          style="border-color:${isPerfect?'#fcd34d':'#e2e8f0'}">
          <p class="text-[10px] font-bold uppercase tracking-widest text-muted-fg mb-3">Season Record</p>
          <div class="text-7xl sm:text-8xl font-black mb-3 flex items-center justify-center gap-3 leading-none">
            <span style="color:${winsColor}">${r.wins}</span>
            <span class="text-muted text-4xl font-light">–</span>
            <span class="text-muted-fg">${r.losses}</span>
          </div>
          <span class="inline-block text-sm font-bold px-4 py-1.5 rounded-full mb-2" style="background:${labelBg};color:${labelColor}">${emoji} ${label}</span>
          <p class="text-xs text-muted-fg">Win% ${r.winPct}% &nbsp;·&nbsp; Strength Index ${r.strength}</p>
        </div>

        <div class="rounded-2xl border border-border bg-white p-4 card-shadow">
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-bold uppercase tracking-widest text-muted-fg">Chemistry Report</p>
            ${r.chemScore !== undefined ? (() => {
              const sc = r.chemScore;
              const scColor = sc >= 70 ? '#16a34a' : sc >= 45 ? '#d97706' : '#dc2626';
              const scBg    = sc >= 70 ? '#f0fdf4' : sc >= 45 ? '#fffbeb' : '#fef2f2';
              const scLabel = sc >= 70 ? 'Strong' : sc >= 45 ? 'Neutral' : 'Weak';
              return `<span class="text-xs font-bold px-2 py-0.5 rounded-full border" style="background:${scBg};color:${scColor};border-color:${scColor}30">${scLabel} · ${sc}%</span>`;
            })() : ''}
          </div>
          <div class="flex flex-col gap-2">${chemReportHtml}</div>
        </div>

        <div class="rounded-2xl border border-border bg-white p-4 card-shadow">
          <p class="text-xs font-bold uppercase tracking-widest text-muted-fg mb-4">Team Statistics</p>
          <div class="flex flex-col gap-3">
            ${statBar('ppg', 'Points Per Game',   r.totals.ppg)}
            ${statBar('rpg', 'Rebounds Per Game', r.totals.rpg)}
            ${statBar('apg', 'Assists Per Game',  r.totals.apg)}
            ${statBar('spg', 'Steals Per Game',   r.totals.spg)}

// ║  EVENT HANDLING                                                             ║
// ╚══════════════════════════════════════════════════════════════════════════════╝

function bindEvents() {
  $app.addEventListener('click', handleClick, { once: true });
}

function handleClick(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) { bindEvents(); return; }
  dispatch(btn.dataset.action);
}

function dispatch(action) {
  if (action.startsWith('coach-pick-')) {
    S.coach = action.slice(11);
    S.phase = 'era-select';
    render(); return;
  }
  if (action.startsWith('era-'))   { startGame(action.slice(4)); return; }
  if (action === 'restart')        { confirmLeave(() => { S.phase = 'coach-select'; S.coach = null; render(); }); return; }
  if (action === 'spin')           { doSpin();       return; }
  if (action === 'skip-team')      { doSkipTeam();   return; }
  if (action === 'skip-decade')    { doSkipDecade(); return; }
  if (action === 'simulate')           { doSimulate();        return; }
  if (action === 'share')              { doShare();           return; }
  if (action === 'open-leaderboard')   { showLeaderboardModal(); return; }
  if (action === 'advance-to-playoffs'){ doAdvanceToPlayoffs();return; }
  if (action === 'sim-next-round')     { doSimNextRound();    return; }
  if (action === 'draft-new-roster')   { S.phase='coach-select'; S.coach=null; render(); return; }
  if (action === 'view-trophies')      { S.phase = 'trophy-room'; render(); return; }
  if (action === 'back-to-menu')       { S.phase = 'coach-select'; render(); return; }
  if (action === 'use-mulligan')       { if (!S.hasMulligan) return; S.hasMulligan = false; S.spinState = 'idle'; S.selectedPlayer = null; S.currentSpin = null; S.draftBoard = []; doSpin(); return; }

  if (action.startsWith('draft-pick-')) {
    const idx = parseInt(action.slice(11), 10);
    const p   = S.draftBoard[idx];
    if (!p) { render(); return; }
    S.selectedPlayer = S.selectedPlayer?.id === p.id ? null : p;
    render(); return;
  }

  if (action.startsWith('pick-')) {
    const id = action.slice(5);
    const p  = S.availablePlayers.find(x => x.id === id);
    if (!p) { render(); return; }
    S.selectedPlayer = S.selectedPlayer?.id === id ? null : p;
    render(); return;
  }
  if (action.startsWith('place-')) { placePlayer(action.slice(6)); return; }
  if (action.startsWith('swap-')) {
    if (S.selectedPlayer) placePlayer(action.slice(5));
    else render();
    return;
  }

  render();
}

function confirmLeave(fn) {
  if (S.phase === 'coach-select' || S.phase === 'era-select' || S.phase === 'results' || S.phase === 'playoffs' || S.phase === 'trophy-room') { fn(); return; }
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.innerHTML = `
    <div style="background:#ffffff;border:1.5px solid #e2e8f0;border-radius:16px;padding:24px;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.12);text-align:center">
      <p style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:8px">Leave Game?</p>
      <p style="font-size:14px;color:#64748b;margin-bottom:20px">Your progress will be lost.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="_cl_cancel" style="flex:1;padding:10px 16px;border-radius:10px;background:#f1f5f9;border:1.5px solid #e2e8f0;color:#0f172a;font-weight:700;cursor:pointer">Cancel</button>
        <button id="_cl_confirm" style="flex:1;padding:10px 16px;border-radius:10px;background:#2563eb;border:none;color:#ffffff;font-weight:700;cursor:pointer">Yes, Restart</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#_cl_cancel').onclick = () => { close(); render(); };
  overlay.querySelector('#_cl_confirm').onclick = () => { close(); fn(); };
  overlay.addEventListener('keydown', e => { if (e.key === 'Escape') { close(); render(); } });
  setTimeout(() => overlay.querySelector('#_cl_cancel').focus(), 0);
}

function startGame(era = 'all') {
  const coach = S.coach;
  S = {
    phase: 'drafting',
    coach,
    selectedEra: era,
    round: 0,
    usedDecades:   [],
    usedPlayerIds: [],
    teamSkips:   1,
    decadeSkips: 1,
    hasMulligan:    true,
    spinState:   'idle',
    currentSpin: null,
    availablePlayers: [],
    draftBoard:       [],
    selectedPlayer:   null,
    roster: { PG:null, SG:null, SF:null, PF:null, C:null, B1:null, B2:null, B3:null },
    result: null,
  };
  render();
}

function doSpin() {
  S.spinState = 'spinning';
  S.selectedPlayer = null;
  render();

  const eraLocked = S.selectedEra && S.selectedEra !== 'all';
  let ticks = 0;
  const total    = 14;
  const interval = setInterval(() => {
    ticks++;
    const teamEl   = document.getElementById('slot-team');
    const decadeEl = document.getElementById('slot-decade');
    if (teamEl)   teamEl.textContent   = pick(TEAMS);
    if (decadeEl) decadeEl.textContent = eraLocked
      ? S.selectedEra
      : pick(availableDecades().length ? availableDecades() : DECADES);

    if (ticks >= total) {
      clearInterval(interval);
      const spin = spinResult();
      if (!spin) { render(); return; }
      S.currentSpin      = spin;
      S.spinState        = 'done';
      S.availablePlayers = getAvailablePlayers(spin.team, spin.decade);
      S.draftBoard       = [...S.availablePlayers].sort(() => Math.random() - 0.5).slice(0, 3);
      S.selectedPlayer   = null;
      render();
    }
  }, 90);
}

function doSkipTeam() {
  if (S.teamSkips <= 0 || !S.currentSpin) { render(); return; }
  S.teamSkips--;
  const spin = spinResult(null, S.currentSpin.decade);
  if (spin) {
    S.currentSpin      = spin;
    S.availablePlayers = getAvailablePlayers(spin.team, spin.decade);
    S.draftBoard       = [...S.availablePlayers].sort(() => Math.random() - 0.5).slice(0, 3);
    S.selectedPlayer   = null;
  }
  render();
}

function doSkipDecade() {
  if (S.selectedEra !== 'all') { render(); return; }
  if (S.decadeSkips <= 0 || !S.currentSpin) { render(); return; }
  S.decadeSkips--;
  const pool = availableDecades().filter(d => d !== S.currentSpin.decade);
  if (!pool.length) { render(); return; }
  const spin = spinResult(S.currentSpin.team, pick(pool));
  if (spin) {
    S.currentSpin      = spin;
    S.availablePlayers = getAvailablePlayers(spin.team, spin.decade);
    S.draftBoard       = [...S.availablePlayers].sort(() => Math.random() - 0.5).slice(0, 3);
    S.selectedPlayer   = null;
  }
  render();
}

function placePlayer(pos) {
  if (!S.selectedPlayer) { render(); return; }
  const spin      = S.currentSpin;
  const player    = { ...S.selectedPlayer, team: spin?.team, decade: spin?.decade };
  const oldPlayer = S.roster[pos];

  if (oldPlayer) {
    const idIdx = S.usedPlayerIds.indexOf(oldPlayer.id);
    if (idIdx !== -1) S.usedPlayerIds.splice(idIdx, 1);
    const decIdx = S.usedDecades.indexOf(oldPlayer.decade);
    if (decIdx !== -1) S.usedDecades.splice(decIdx, 1);
  }

  S.roster[pos]      = player;
  S.usedDecades.push(spin?.decade);
  S.usedPlayerIds.push(player.id);
  if (!oldPlayer) S.round++;
  S.spinState        = 'idle';
  S.currentSpin      = null;
  S.availablePlayers = [];
  S.draftBoard       = [];
  S.selectedPlayer   = null;
  render();
}

function doSimulate() {
  const starters = POSITIONS.map(p => S.roster[p]).filter(Boolean);
  const bench    = BENCH_POSITIONS.map(p => S.roster[p]).filter(Boolean);
  S.result = simulateSeason(starters, bench, S.coach);
  S.phase  = 'results';
  saveLeaderboard();
  render();
}

function doShareText() {
  const r = S.result;
  if (!r) return;

  const isPerfect  = r.wins === 82;
  const isHistoric = r.wins >= 75;
  const isElite    = r.wins >= 70;
  const isPlayoff  = r.wins >= 60;

  let tier;
  if (isPerfect)       tier = '🏆 PERFECT SEASON';
  else if (isHistoric) tier = '🔥 Historic Season';
  else if (isElite)    tier = '⚡ Elite Season';
  else if (isPlayoff)  tier = '✅ Playoff Contender';
  else                 tier = '😬 Rough Season';

  const starterLines = POSITIONS.map(pos => {
    const p = S.roster[pos];
    return p ? `🌟 ${fmtPlayerLine(p)}` : '';
  }).filter(Boolean).join('\n');

  const benchLines = BENCH_POSITIONS.map(pos => {
    const p = S.roster[pos];
    return p ? `💪 ${fmtPlayerLine(p)}` : '';
  }).filter(Boolean).join('\n');

  const chemLine = r.chemScore !== undefined ? `\nChemistry: ${Math.round(r.chemScore)}%` : '';

  const text = [
    `🏀 ${r.wins}-${r.losses} — ${tier}`,
    '',
    'Starters:',
    starterLines,
    '',
    'Bench:',
    benchLines,
    chemLine,
    '',
    'Can you beat it? → 82-0.com',
  ].join('\n').replace(/\n{3,}/g, '\n\n').trim();

  if (navigator.share) {
    navigator.share({ title: '82-0', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text)
      .then(() => showToast('Copied to clipboard! 🏀'))
      .catch(() => showToast('Failed to copy to clipboard'));
  }
}

function doShare() {
  doShareText();
}

function saveLeaderboard() {

  if (!r) return;
  const entry = {
    date:     new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    wins:     r.wins,
    losses:   r.losses,
    starters: POSITIONS.map(p => S.roster[p]?.name || '—').join(', '),
  };

  try { lb = JSON.parse(localStorage.getItem('nba820_lb') || '[]'); } catch(e) {}

function showLeaderboardModal() {

function doAdvanceToPlayoffs() {
  const playerStrength = S.result.strength;
  const playerSeed     = getPlayerSeed(S.result.wins);
  const bracket        = buildBracket(playerSeed, playerStrength);

  S.playoffs = {
    playerSeed,
    playerStrength,
    initialBracket: bracket.map(pair => pair.map(t => ({ ...t }))),
    rounds: [],       // completed rounds: array of arrays of series results
    currentRound: 0,  // 0=QF, 1=SF, 2=Finals
    bracket,          // current round matchups
    eliminated: false,
    champion: false,
    tickState: null,
    roundNames: ['Conference Quarterfinals', 'Conference Semifinals', 'NBA Finals'],
  };
  S.phase = 'playoffs';
  render();
}

function doSimNextRound() {
  const po = S.playoffs;
  if (po.tickState) return; // guard against double-click during animation

  const results = po.bracket.map(([teamA, teamB]) => {
    const series = simulateSeries(teamA.strength, teamB.strength);
    return { teamA, teamB, ...series };
  });

  const playerResult = results.find(r => r.teamA.isPlayer || r.teamB.isPlayer);
  const playerWon = playerResult
    ? (playerResult.teamA.isPlayer ? playerResult.won : !playerResult.won)
    : true;

  const maxGames = Math.max(...results.map(r => r.games.length));
  po.tickState = { results, revealedGames: 0, maxGames, done: false, playerWon };
  render();

  const ticker = setInterval(() => {
    po.tickState.revealedGames++;
    render();
    if (po.tickState.revealedGames >= po.tickState.maxGames) {
      clearInterval(ticker);
      po.tickState.done = true;
      render();
      setTimeout(() => {
        po.rounds.push(po.tickState.results);
        const { results: r2, playerWon: pw } = po.tickState;
        po.tickState = null;
        if (!pw) {
          po.eliminated = true;
          po.eliminatedIn = po.roundNames[po.currentRound];
        } else {
          const winners = r2.map(r => r.won ? r.teamA : r.teamB);
          po.currentRound++;
          if (po.currentRound === 3) {
            po.champion = true;
          } else {
            po.bracket = [];
            for (let i = 0; i < winners.length; i += 2) {
              po.bracket.push([winners[i], winners[i + 1]]);
            }
          }
        }
        render();
      }, 800);
    }
  }, 400);
}

// ║  PLAYOFF RENDERING                                                          ║
// ╚══════════════════════════════════════════════════════════════════════════════╝

function renderPlayoffs() {
  const po = S.playoffs;
  const r  = S.result;

  if (po.champion) return renderChampionship();
  if (po.eliminated) return renderEliminated();

  const roundName = po.roundNames[po.currentRound];
  const completedRounds = po.rounds;

  const renderTeamCard = (team, seriesScore = null, won = null) => {
    const isPlayer = team.isPlayer;
    const border   = isPlayer ? 'border-primary' : 'border-border';
    const bg       = isPlayer ? 'bg-blue-50' : 'bg-white';
    const badge    = won === true ? '✅' : won === false ? '❌' : '';
    return `
      <div class="flex items-center gap-2 px-3 py-2 rounded-lg border ${border} ${bg} card-shadow">
        <span class="text-xs font-bold ${isPlayer ? 'text-primary' : 'text-foreground'} flex-1 truncate">
          ${isPlayer ? '⭐ ' : ''}${team.name}
        </span>
        ${seriesScore !== null ? `<span class="text-xs font-mono font-bold text-muted-fg">${seriesScore}</span>` : ''}
        ${badge ? `<span class="text-xs">${badge}</span>` : ''}
      </div>`;
  };

  const renderMatchup = (teamA, teamB, seriesA = null, seriesB = null) => {
    const wonA = seriesA !== null ? (seriesA > seriesB) : null;
    const wonB = seriesB !== null ? (seriesB > seriesA) : null;
    return `
      <div class="flex flex-col gap-1">
        ${renderTeamCard(teamA, seriesA, wonA)}
        <div class="text-center text-[10px] text-muted-fg font-bold">vs</div>
        ${renderTeamCard(teamB, seriesB, wonB)}
      </div>`;
  };

  let bracketHTML = '';
  const ts = po.tickState;

  // Show completed rounds
  for (let ri = 0; ri < completedRounds.length; ri++) {
    const round = completedRounds[ri];
    bracketHTML += `
      <div class="mb-4">
        <p class="text-[10px] font-bold uppercase tracking-widest text-muted-fg mb-2">${po.roundNames[ri]}</p>
        <div class="grid grid-cols-2 gap-3">
          ${round.map(sr => renderMatchup(sr.teamA, sr.teamB, sr.playerWins, sr.oppWins)).join('')}
        </div>
      </div>`;
  }

  if (ts) {
    // Ticking state: render current round with game-by-game reveals
    const renderTickingMatchup = (sr) => {
      const isPlayerSeries = sr.teamA.isPlayer || sr.teamB.isPlayer;
      const revealedGames = sr.games.slice(0, ts.revealedGames);
      const pending = !ts.done && revealedGames.length < sr.games.length;
      const gameBubbles = revealedGames.map(g => {
        return `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-[10px] font-black ${g === 'W' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-red-100 text-red-600 border border-red-200'}">${g}</span>`;
      }).join('');
      const pendingDot = pending
        ? `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full border-2 border-dashed border-border text-muted-fg text-[10px] animate-pulse">·</span>`
        : '';
      const pWins = sr.games.slice(0, ts.revealedGames).filter(g => g === 'W').length;
      const oWins = sr.games.slice(0, ts.revealedGames).filter(g => g === 'L').length;
      return `
        <div class="flex flex-col gap-2 p-3 rounded-xl border ${isPlayerSeries ? 'border-primary bg-blue-50' : 'border-border bg-white'} card-shadow" >
          <div class="flex items-center justify-between gap-2">
            <span class="text-xs font-bold ${sr.teamA.isPlayer ? 'text-primary' : 'text-foreground'} truncate">${sr.teamA.isPlayer ? '⭐ ' : ''}${sr.teamA.name}</span>
            <span class="text-xs font-mono text-foreground font-black">${pWins}–${oWins}</span>
            <span class="text-xs font-bold ${sr.teamB.isPlayer ? 'text-primary' : 'text-foreground'} truncate text-right">${sr.teamB.isPlayer ? '⭐ ' : ''}${sr.teamB.name}</span>
          </div>
          <div class="flex flex-wrap gap-1">${gameBubbles}${pendingDot}</div>
        </div>`;
    };

    bracketHTML += `
      <div class="mb-4">
        <p class="text-[10px] font-bold uppercase tracking-widest text-primary mb-2">${roundName} — Simulating...</p>
        <div class="flex flex-col gap-3">
          ${ts.results.map(sr => renderTickingMatchup(sr)).join('')}
        </div>
      </div>`;
  } else {
    // Show current round matchups (not yet simulated)
    bracketHTML += `
      <div class="mb-4">
        <p class="text-[10px] font-bold uppercase tracking-widest text-primary mb-2">${roundName} — Up Next</p>
        <div class="grid grid-cols-2 gap-3">
          ${po.bracket.map(([a, b]) => renderMatchup(a, b)).join('')}
        </div>
      </div>`;
  }

  const simBtnDisabled = !!ts;
  const simBtnLabel = ts ? 'Simulating...' : `Simulate ${roundName} →`;

  return `
  <div class="min-h-screen flex flex-col main-gradient">
    ${renderHeader(false)}
    <main class="flex-1 flex flex-col items-center px-4 py-8">
      <div class="w-full max-w-lg flex flex-col gap-5">

        <div class="text-center">
          <p class="text-xs font-bold uppercase tracking-widest text-primary mb-1">NBA Playoffs</p>
          <h1 class="text-2xl font-black text-foreground">Playoff Bracket</h1>
          <p class="text-sm text-muted-fg mt-1">Regular Season: ${r.wins}–${r.losses} · Seed #${po.playerSeed}</p>
        </div>

        <div class="rounded-2xl border border-border bg-white p-4 card-shadow">
          ${bracketHTML}
        </div>

        <button data-action="sim-next-round" ${simBtnDisabled ? 'disabled' : ''}
          class="py-4 rounded-xl font-black text-base transition-all text-center card-shadow ${simBtnDisabled ? 'bg-card2 border border-border text-muted-fg cursor-not-allowed' : 'bg-primary text-white hover:bg-blue-700 cursor-pointer'}">
          ${simBtnLabel}
        </button>

        <button data-action="draft-new-roster"
          class="py-3 rounded-xl font-bold text-sm border border-border bg-white text-foreground hover:border-primary hover:bg-card2 transition-all cursor-pointer text-center card-shadow">
          Draft New Roster
        </button>

      </div>
    </main>
    ${renderFooter()}
  </div>`;
}

function renderChampionship() {
  const po = S.playoffs;
  const r  = S.result;

  if (!po.hasSavedTrophy) {
    po.hasSavedTrophy = true;
    saveToTrophyRoom();
    setTimeout(() => {
      if (typeof confetti !== 'undefined') {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#f97316', '#eab308', '#ffffff'] });
      }
    }, 200);
  }

  const finalsResult = po.rounds[po.rounds.length - 1].find(
    sr => sr.teamA.isPlayer || sr.teamB.isPlayer
  );
  const oppTeam = finalsResult.teamA.isPlayer ? finalsResult.teamB : finalsResult.teamA;
  const score   = finalsResult.teamA.isPlayer
    ? `${finalsResult.playerWins}–${finalsResult.oppWins}`
    : `${finalsResult.oppWins}–${finalsResult.playerWins}`;

  const roundSummary = po.rounds.map((round, i) => {
    const sr = round.find(s => s.teamA.isPlayer || s.teamB.isPlayer);
    if (!sr) return '';
    const opp = sr.teamA.isPlayer ? sr.teamB : sr.teamA;
    const w   = sr.teamA.isPlayer ? sr.playerWins : sr.oppWins;
    const l   = sr.teamA.isPlayer ? sr.oppWins : sr.playerWins;
    return `<p class="text-sm text-muted-fg">${po.roundNames[i]}: <span class="text-foreground font-semibold">def. ${opp.name} ${w}–${l}</span></p>`;
  }).join('');

  return `
  <div class="min-h-screen flex flex-col main-gradient">
    ${renderHeader(false)}
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-8">
      <div class="w-full max-w-lg flex flex-col gap-5 items-center text-center animate-fade-up">

        <div class="text-6xl mb-2">🏆</div>
        <h1 class="text-3xl font-black text-primary">WORLD CHAMPIONS!</h1>
        <p class="text-base text-foreground">Your team conquered the NBA Playoffs!</p>

        <div class="rounded-2xl border-2 border-amber-300 bg-amber-50 p-5 w-full text-left card-shadow">
          <p class="text-xs font-bold uppercase tracking-widest text-amber-600 mb-3">Championship Run</p>
          ${roundSummary}
          <p class="text-base font-black text-amber-700 mt-3">NBA Finals: def. ${oppTeam.name} ${score}</p>
          <p class="text-sm text-muted-fg mt-2">Regular Season: ${r.wins}–${r.losses} · Seed #${po.playerSeed}</p>
        </div>

        <div class="flex flex-col gap-3 w-full">
          <button data-action="share" class="py-3 rounded-xl font-bold text-sm bg-primary text-white hover:bg-blue-700 transition-all cursor-pointer card-shadow">
            Share Championship 🏆
          </button>
          <button data-action="draft-new-roster" class="py-3 rounded-xl font-bold text-sm border border-border bg-white text-foreground hover:border-primary hover:bg-card2 transition-all cursor-pointer card-shadow">
            Draft New Roster
          </button>
        </div>

      </div>
    </main>
    ${renderFooter()}
  </div>`;
}

function renderEliminated() {
  const po = S.playoffs;
  const r  = S.result;

  const lastRound = po.rounds[po.rounds.length - 1];
  const elimSr    = lastRound.find(sr => sr.teamA.isPlayer || sr.teamB.isPlayer);
  const oppTeam   = elimSr.teamA.isPlayer ? elimSr.teamB : elimSr.teamA;
  const playerW   = elimSr.teamA.isPlayer ? elimSr.playerWins : elimSr.oppWins;
  const playerL   = elimSr.teamA.isPlayer ? elimSr.oppWins : elimSr.playerWins;

  const roundSummary = po.rounds.map((round, i) => {
    const sr = round.find(s => s.teamA.isPlayer || s.teamB.isPlayer);
    if (!sr) return '';
    const opp = sr.teamA.isPlayer ? sr.teamB : sr.teamA;
    const w   = sr.teamA.isPlayer ? sr.playerWins : sr.oppWins;
    const l   = sr.teamA.isPlayer ? sr.oppWins : sr.playerWins;
    const won = w > l;
    return `<p class="text-sm ${won ? 'text-muted-fg' : 'text-red-500'}">${po.roundNames[i]}: <span class="${won ? 'text-foreground' : 'text-red-600'} font-semibold">${won ? `def. ${opp.name} ${w}–${l}` : `lost to ${opp.name} ${w}–${l}`}</span></p>`;
  }).join('');

  return `
  <div class="min-h-screen flex flex-col main-gradient">
    ${renderHeader(false)}
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-8">
      <div class="w-full max-w-lg flex flex-col gap-5 items-center text-center animate-fade-up">

        <div class="text-5xl mb-2">💔</div>
        <h1 class="text-2xl font-black text-foreground">Eliminated</h1>
        <p class="text-sm text-muted-fg">in the <span class="text-foreground font-semibold">${po.eliminatedIn}</span></p>

        <div class="rounded-2xl border border-border bg-white p-5 w-full text-left card-shadow">
          <p class="text-xs font-bold uppercase tracking-widest text-muted-fg mb-3">Playoff Run</p>
          ${roundSummary}
          <p class="text-sm text-muted-fg mt-3">Regular Season: ${r.wins}–${r.losses} · Seed #${po.playerSeed}</p>
        </div>

        <div class="flex flex-col gap-3 w-full">
          <button data-action="draft-new-roster" class="py-3 rounded-xl font-bold text-sm bg-primary text-white hover:bg-blue-700 transition-all cursor-pointer card-shadow">
            Draft New Roster
          </button>
          <button data-action="share" class="py-3 rounded-xl font-bold text-sm border border-border bg-white text-foreground hover:border-primary hover:bg-card2 transition-all cursor-pointer card-shadow">
            Share Result
          </button>
        </div>

      </div>
    </main>
    ${renderFooter()}
  </div>`;
}


function renderTrophyRoom() {
  let trophies = [];
  try { trophies = JSON.parse(localStorage.getItem('nba820_trophies') || '[]'); } catch(e) {}

  const emptyState = `
    <div class="flex flex-col items-center justify-center gap-4 py-16 text-center">
      <div class="text-5xl">🏀</div>
      <h2 class="text-xl font-black text-foreground">No Championships Yet</h2>
      <p class="text-sm text-muted-fg max-w-xs">Draft your first legendary roster and win the NBA Finals to enshrine it here.</p>
    </div>`;

  const trophyCards = trophies.map(t => {
    const isPerfect   = t.wins === 82 && t.losses === 0;
    const cardBorder  = isPerfect ? 'border-amber-300' : 'border-border';
    const cardBg      = isPerfect ? 'bg-amber-50' : 'bg-white';
    const cardGlow    = isPerfect ? 'style="box-shadow:0 2px 16px rgba(217,119,6,0.15)"' : 'class="card-shadow"';
    const nameColor   = isPerfect ? 'text-amber-700' : 'text-primary';
    const recordColor = isPerfect ? 'text-amber-700' : 'text-foreground';
    const chemColor   = isPerfect ? 'text-amber-600' : 'text-primary';

    return `
      <div class="rounded-2xl border p-4 flex flex-col gap-3 ${cardBorder} ${cardBg}" ${cardGlow}>
        ${isPerfect ? `<p class="text-[10px] font-black uppercase tracking-widest text-amber-600">⭐ Perfect Season — 82-0</p>` : ''}
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <p class="font-black text-base ${nameColor} truncate">${t.coachName}</p>
            <p class="text-xs text-muted-fg">${t.coachSystem}</p>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="font-black text-lg ${recordColor}">${t.wins}–${t.losses}</p>
            <p class="text-xs text-muted-fg">${t.date}</p>
          </div>
        </div>
        <div class="border-t ${isPerfect ? 'border-amber-200' : 'border-border'} pt-3 flex flex-col gap-2">
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-muted-fg mb-1">Starting 5</p>
            <p class="text-xs text-foreground leading-relaxed">${t.starters}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-muted-fg mb-1">Bench</p>
            <p class="text-xs text-foreground leading-relaxed">${t.bench}</p>
          </div>
        </div>
        <div class="flex items-center justify-between border-t ${isPerfect ? 'border-amber-200' : 'border-border'} pt-2.5">
          <p class="text-xs text-muted-fg">Chemistry</p>
          <p class="text-xs font-bold ${chemColor}">${t.chemScore}%</p>
        </div>
      </div>`;
  }).join('');

  return `
  <div class="flex flex-col min-h-screen main-gradient">
    ${renderHeader(false)}
    <main class="flex-1 flex flex-col items-center px-4 pt-6 pb-8">
      <div class="w-full max-w-2xl flex flex-col gap-5 animate-fade-up">

        <div class="flex items-center justify-between gap-4">
          <div>
            <p class="text-xs font-bold uppercase tracking-widest text-amber-600 mb-1">Hall of Fame</p>
            <h1 class="text-2xl font-black text-foreground">Trophy Room</h1>
          </div>
          <button data-action="back-to-menu"
            class="flex-shrink-0 text-[11px] px-3 py-1.5 rounded-full border border-border bg-card2 text-muted-fg hover:text-foreground hover:border-primary transition-all cursor-pointer">
            ← Main Menu
          </button>
        </div>

        ${trophies.length === 0 ? emptyState : `<div class="flex flex-col gap-4">${trophyCards}</div>`}

      </div>
    </main>
    ${renderFooter()}
  </div>`;
}
