<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NBA All-Time Roster Builder — Can You Go 82-0?</title>
  <meta name="description" content="Draft an all-time NBA roster across every era and franchise, then simulate a full 82-game season. Can you build the perfect undefeated team? Pick your coach, manage the salary cap, and find out." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN + design-token config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Fira Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            background:   '#f8fafc',
            card:         '#ffffff',
            card2:        '#f1f5f9',
            border:       '#e2e8f0',
            foreground:   '#0f172a',
            muted:        '#94a3b8',
            'muted-fg':   '#64748b',
            primary:      '#2563eb',
            'primary-fg': '#fff',
          },
          animation: {
            'fade-up':    'fadeUp 0.3s ease-out',
            'spin-tick':  'spinTick 0.08s steps(1) infinite',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'scale-in':   'scaleIn 0.2s ease-out',
          },
          keyframes: {
            fadeUp:    { from: { opacity: 0, transform: 'translateY(8px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            spinTick:  { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.3 } },
            pulseGlow: { '0%,100%': { boxShadow: '0 0 0 0 rgba(37,99,235,0.25)' }, '50%': { boxShadow: '0 0 0 8px rgba(37,99,235,0)' } },
            scaleIn:   { from: { opacity: 0, transform: 'scale(0.97)' }, to: { opacity: 1, transform: 'scale(1)' } },
          },
        },
      },
    };
  </script>

  <!-- Custom CSS (animations, scrollbar, card classes) -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Confetti (used in championship screen) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Loading overlay — removed by js/data/players.js once the DB is ready -->
  <div id="loading-overlay" style="
    position:fixed;inset:0;background:#f8fafc;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Fira Sans',sans-serif;color:#0f172a;z-index:9999">
    <div style="width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#2563eb;
      border-radius:50%;animation:_spin 0.7s linear infinite"></div>
    <p style="margin-top:16px;font-size:14px;color:#64748b;letter-spacing:0.02em">Loading players…</p>
    <style>@keyframes _spin { to { transform: rotate(360deg); } }</style>
  </div>

  <!-- App mount point — all UI is injected here by js/ui/render.js -->
  <div id="app"></div>

  <!-- Single ES-module entry point — all other JS is imported from here -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
