<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>82-0 — Can Your All-Time NBA Roster Go Undefeated?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Fira Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            background: '#09090b',
            card:       '#18181b',
            card2:      '#1f1f23',
            border:     '#27272a',
            foreground: '#fafafa',
            muted:      '#3f3f46',
            'muted-fg': '#a1a1aa',
            primary:    '#f97316',
            'primary-fg': '#fff',
          },
          animation: {
            'fade-up':   'fadeUp 0.3s ease-out',
            'spin-tick': 'spinTick 0.08s steps(1) infinite',
            'pulse-glow':'pulseGlow 2s ease-in-out infinite',
            'scale-in':  'scaleIn 0.2s ease-out',
          },
          keyframes: {
            fadeUp:    { from: { opacity: 0, transform: 'translateY(10px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            spinTick:  { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.3 } },
            pulseGlow: { '0%,100%': { boxShadow: '0 0 0 0 rgba(249,115,22,0.4)' }, '50%': { boxShadow: '0 0 0 10px rgba(249,115,22,0)' } },
            scaleIn:   { from: { opacity: 0, transform: 'scale(0.95)' }, to: { opacity: 1, transform: 'scale(1)' } },
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: 'Fira Sans', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 9999px; }

    .player-card { transition: border-color 0.15s, background 0.15s, transform 0.1s; }
    .player-card:hover:not(.selected) { border-color: #f97316 !important; background: #1f1f23 !important; transform: translateY(-1px); }
    .player-card.selected { border-color: #f97316 !important; background: #f9731615 !important; }

    .slot-empty.droppable { cursor: pointer; }
    .slot-empty.droppable:hover { border-color: #f97316 !important; background: #f9731615 !important; }

    .slot-badge { transition: all 0.12s; }
    .slot-spinning .slot-badge { animation: spinTick 0.08s steps(1) infinite; }

    .main-gradient {
      background: linear-gradient(to bottom, #09090b 0%, #18181b 50%, #09090b 100%);
    }

    .stat-bar-fill { transition: width 0.8s cubic-bezier(.4,0,.2,1); }

    .perfect-glow {
      box-shadow: 0 0 40px rgba(249, 115, 22, 0.35), 0 0 80px rgba(249, 115, 22, 0.15);
    }

    .era-card { transition: border-color 0.15s, background 0.15s, transform 0.1s; }
    .era-card:hover { transform: translateY(-1px); }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body class="dark">

<div id="app"></div>

<script src="database.js"></script>
<script src="simulation.js"></script>
<script src="app.js"></script>

</body>
</html>
